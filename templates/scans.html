<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nmap Scanner</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h1>Nmap Scan Engine</h1>

    <hr>

    <div class="card">

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Select Target
                    </label>

                    <select
                        name="target_id"
                        class="form-select"
                        required>

                        <option value="">
                            Choose Target
                        </option>

                        {% for target in targets %}

                        <option value="{{ target.id }}">

                            {{ target.target_name }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary">

                    Run Nmap Scan

                </button>

            </form>

        </div>

    </div>

    <hr>

    <h3>Scan Results</h3>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">

            <tr>

                <th>Port</th>
                <th>Protocol</th>
                <th>Service</th>
                <th>State</th>

            </tr>

        </thead>

        <tbody>

            {% if scan_results %}

                {% for result in scan_results %}

                <tr>

                    <td>{{ result.port }}</td>

                    <td>{{ result.protocol }}</td>

                    <td>{{ result.service }}</td>

                    <td>{{ result.state }}</td>

                </tr>

                {% endfor %}

            {% else %}

                <tr>

                    <td colspan="4" class="text-center">

                        No scan results available.

                    </td>

                </tr>

            {% endif %}

        </tbody>

    </table>

</div>

</body>

</html>
