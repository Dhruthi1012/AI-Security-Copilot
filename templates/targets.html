<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Target Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h1>Target Management</h1>

    <hr>

    <!-- Add Target Form -->

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                Target
            </label>

            <input
                type="text"
                name="target_name"
                class="form-control"
                placeholder="scanme.nmap.org or 192.168.1.1"
                required>

        </div>

        <button
            type="submit"
            class="btn btn-primary">

            Add Target

        </button>

    </form>

    <hr>

    <!-- Targets Table -->

    <table class="table table-bordered table-striped">

        <thead class="table-dark">

            <tr>

                <th>ID</th>
                <th>Target</th>
                <th>Type</th>
                <th>Action</th>

            </tr>

        </thead>

        <tbody>

            {% if targets %}

                {% for target in targets %}

                <tr>

                    <td>{{ target.id }}</td>

                    <td>{{ target.target_name }}</td>

                    <td>{{ target.target_type }}</td>

                    <td>

                        <a
                            href="/delete-target/{{ target.id }}"
                            class="btn btn-danger btn-sm">

                            Delete

                        </a>

                    </td>

                </tr>

                {% endfor %}

            {% else %}

                <tr>

                    <td colspan="4" class="text-center">

                        No targets added yet.

                    </td>

                </tr>

            {% endif %}

        </tbody>

    </table>

</div>

</body>

</html>
